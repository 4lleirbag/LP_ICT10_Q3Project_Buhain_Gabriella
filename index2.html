<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <title>Intramurals SY:2025-26</title>
    <style>
   
   
        body
        {
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 0;
            background-size: 100% 200%;
            
        
        }
    
         .navbar a {
            text-decoration: none;
            color: #0d6efd;
            padding: 10px 20px;
            margin: 0 10px;
            border-radius: 5px;
            font-size: 16px;
            transition: background-color 0.3s;
        }

        
        .navbar a:hover {
            background-color: #0d6efd ;
            color: white;
        }

        
        .form-container {
            background-color: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 300px;
        }

        .form-container h2 {
            margin-bottom: 20px;
            font-size: 22px;
            color: #0d6efd;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .btn {
            background: linear-gradient(90deg, #0d6efd, #0b5ed7);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            width: 100%;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn:hover {
            background: linear-gradient(90deg, #0b5ed7, #0d6efd);
        }

        .message {
            margin-top: 20px;
            font-size: 14px;
            color: #28a745;
        }
    </style>
</head>
<body>



  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <a class="navbar-brand" href="index.html">Intramural 2025-2026</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="index2.html">Players List</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="index.html"> Team checker</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="index2.html">Sign up </a>
          </li>
        </ul>
      </div>
  </nav>

 
    <!-- Account Creation Form -->
    <div class="form-container">
        <h2>Create Account</h2>
        <form id="createAccountForm">
            <input type="text" id="username" placeholder="Enter Username" required>
            <input type="password" id="password" placeholder="Enter Password" required>
            <button type="submit" class="btn">Sign up</button>
        </form>
        <div class="message" id="accountMessage"></div>
    </div>

   

    <script>
        // Handle form submission and account creation
        document.getElementById('createAccountForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Prevent the default form submission

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const messageElement = document.getElementById('accountMessage');

            // Simulate account creation process
            if (username && password) {
                messageElement.innerHTML = `Account created. You may now log in using your credentials.`;
                messageElement.style.color = '#28a745'; // Green color for success
            } else {
                messageElement.innerHTML = `❌ Please fill in all fields.`;
                messageElement.style.color = '#dc3545'; // Red color for error
            }
        }
    ) ;
    </script>

</body>
</html>
